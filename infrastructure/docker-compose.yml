version: '3.8'

services:
  # Knowledge Graph (Local Docker)
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/aiekp_password
      # Configure memory limits for Neo4j
      NEO4J_server_memory_pagecache_size: 512M
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    deploy:
      resources:
        limits:
          memory: 2G

  # Vector Database (Local Docker)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1G

  # File / Object Storage (Local Docker)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aiekp_user
      MINIO_ROOT_PASSWORD: aiekp_password
    ports:
      - "9000:9000" # API
      - "9001:9001" # WebUI
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  neo4j_data:
  qdrant_data:
  minio_data:
