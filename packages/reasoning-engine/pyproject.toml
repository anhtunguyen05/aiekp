[project]
name = "reasoning-engine"
version = "0.1.0"
description = "AIEKP Reasoning Engine using LangGraph"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "langchain-core",
    "langchain-openai",
    "langgraph",
    "langgraph-checkpoint-postgres",
    "httpx",
    "pydantic>=2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reasoning_engine"]

[tool.uv.sources]
aiekp-shared = { workspace = true }
