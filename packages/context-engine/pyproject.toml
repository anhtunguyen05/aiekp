[project]
name = "context-engine"
version = "0.1.0"
description = "Context Intelligence Engine for retrieving and assembling AI reasoning evidence"
authors = [
    { name = "AIEKP Team", email = "team@example.com" }
]
dependencies = [
    "pydantic>=2.0.0",
    "httpx>=0.27.0",
    "aiekp-shared"
]
requires-python = ">=3.12"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/context_engine"]

[tool.uv.sources]
aiekp-shared = { workspace = true }
